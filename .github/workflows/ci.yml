name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install valgrind
        run: sudo apt-get update -qq && sudo apt-get install -y -qq valgrind

      - name: Build tests
        run: |
          cmake -S . -B build -DCMAKE_CXX_FLAGS="-fsanitize=address -fno-omit-frame-pointer" -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address"
          cmake --build build --target test_lexer

      - name: Run tests (ASan)
        run: ./build/test_lexer

      - name: Build cc89 + test_lexer (no sanitizer)
        run: |
          cmake -S . -B build-valgrind
          cmake --build build-valgrind

      - name: Run tests (Valgrind)
        run: valgrind --leak-check=full --error-exitcode=1 ./build-valgrind/test_lexer

      - name: Parser suite
        run: python3 tools/tt.py parse --no-build --cc89 build-valgrind/cc89

      - name: Codegen execution suite
        run: python3 tools/tt.py run --no-build --cc89 build-valgrind/cc89
